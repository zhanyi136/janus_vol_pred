# ============================================================
# 波动率预测 - 生产环境配置文件
# ============================================================

# 数据路径
paths:
  # 原始数据根目录
  data_root: "/data/market_data/binance/future"
  # binance交易规范
  binance_assets: "/data/sigma/sigma/basic/binance_assets.json"

research:
  log_dir: "/home/zhangzhanyi/workspace/janus_vol_pred/janus_vol_pred/logs"
  output_root: "/data/sigma/zzy/janus/results/vol_pred_prod"
  features_output_dir: "features"
  results_output_dir: "results"

# 原始数据来源配置
data_sources:
  # 只读 Tardis book_ticker 根目录
  tardis_book_ticker_root: "/data/market_data/binance/future"

  # 自己从行情库补齐后的 book_ticker 存储目录
  fallback_book_ticker_root: "/data/sigma/zzy/janus/results/vol_pred_prod/raw_book_ticker"

  # 当 Tardis 和历史 fallback 都不存在时，是否允许从行情库补齐
  enable_hangqing_fallback: true

# 每日定时重训前的数据准备
daily_retrain:
  # 默认关闭；定时任务启用时再打开
  enabled: True
  trigger_utc_hour: 0
  trigger_utc_minute: 0
  fail_if_feature_dependency_missing: true

# 行情库下载配置
hangqing:
  clickhouse_host: "13.231.173.109"
  clickhouse_port: 8123
  clickhouse_database: "marketData"
  clickhouse_user_env: "HANGQING_CH_USER"
  clickhouse_password_env: "HANGQING_CH_PASSWORD"

# 日志配置
logging:
  # 日志级别
  level: "INFO"

# 运行配置
execution:

  instrument_type: "future"

  # 币种列表
  symbols:
    - XRPUSDT
    # - DOGEUSDT
    # - BNBUSDT
    # - ZECUSDT
    # - SUIUSDT
    # - ADAUSDT
    # - NEARUSDT
    # - AVAXUSDT

    # - BCHUSDT
    # - FILUSDT
    # - LINKUSDT
    # - AAVEUSDT
    # - ENAUSDT
    # - LTCUSDT
    # - 1000SHIBUSDT
    # - ARBUSDT

  # 处理日期范围
  start_date: "2026-01-01"
  # start_date: "2025-01-01"
  # end_date: "2025-12-31"
  end_date: "2026-01-01"
  # end_date: "2026-04-01"

  use_prev_day: True  # 是否使用前一天数据进行特征计算
  incremental_features_label: True  # 是否启用增量更新（跳过已完成的任务）
  incremental_features_max_retries: 2  # 增量更新的最大重试次数

# 采样配置
sampling:
  # 采样频率 (纳秒)
  interval_ns: 20_000_000  # 20ms = 20,000,000 ns

  # 预热期 (分钟) - 前N分钟数据丢弃
  warmup_minutes: 0

# 特征配置
features:
  # 波动率窗口 (分钟)
  vol_windows:
    - 1
    - 3
    - 5
    - 10
    - 15
    - 30
    - 60
    - 120

# 标签配置
label:
  # 标签的波动率窗口（分钟）
  vol_window: 5

# 训练配置
train:
  # 降采样频率
  train_downsample_freq: 20_000_000

  # 训练集天数
  train_days: 7
  # 验证集天数
  val_days: 1
  # 测试天数
  test_days: 1

  # LightGBM参数
  lgb_params:
    n_jobs: 30
    objective: "regression"  # 改回回归 (MSE)，拟合正态分布最准
    num_leaves: 64           # 增加叶子数
    max_depth: 8             # 限制最大深度
    learning_rate: 0.05      # 降低学习率
    n_estimators: 1000       # 提高树的数量
    min_data_in_leaf: 50     # 每叶最小样本数
    feature_fraction: 0.8    # 特征采样
    bagging_fraction: 0.8    # 数据采样

  # 增量模式
  incremental: False

  # 最大重试次数
  max_retries: 2

# 多进程配置
multiprocess:
  # 并行处理的币种数
  max_workers: 4


production_train:
  log_dir: "/root/workspace/janus_vol_pred/logs"

  output_root: "/data/sigma/zzy/janus/results/vol_pred_prod"

  features_output_dir: "features"
  results_output_dir: "results_production"
  fallback_book_ticker_output_dir: "raw_book_ticker"

realtime_predict:
  log_dir: "/root/workspace/janus_vol_pred/logs"
  results_root: "/root/workspace/janus_vol_pred/results"

  zmq_recv_addr: "tcp://127.0.0.1:5555"
  zmq_send_addr: "tcp://127.0.0.1:6666"

  model_lookback_days: 30
  # 实盘理论值通常为 120min；测试时可临时设为 1min 以快速有数据。注意特征里可能含 NaN，不过LightGBM 能接受 NaN，能输出预测值，就是会不准。
  warmup_minutes: 5
  symbols:          # 新增：实盘跑的币种，独立于历史训练的 symbols
    - XRPUSDT



